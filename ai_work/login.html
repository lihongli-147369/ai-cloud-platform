<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>用户登录 - AI托管云平台</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#3b82f6',
                        secondary: '#64748b',
                        accent: '#10b981',
                        danger: '#ef4444',
                    },
                },
            }
        }
    </script>
</head>
<body class="bg-gray-50">
    <nav class="bg-white shadow-md">
        <div class="container mx-auto px-4 py-3 flex justify-between items-center">
            <a href="index.html" class="text-2xl font-bold text-primary">
                <i class="fa fa-cloud"></i> AI托管云平台
            </a>
            <div class="flex items-center space-x-4">
                <a href="services.html" class="text-gray-700 hover:text-primary">服务介绍</a>
                <span id="userStatus"></span>
            </div>
        </div>
    </nav>
    
    <div class="container mx-auto px-4 py-8">
        <div class="max-w-md mx-auto bg-white rounded-lg shadow-md p-8">
            <h2 class="text-2xl font-bold text-center mb-6">用户登录</h2>
            <form id="loginForm">
                <div class="mb-4">
                    <label for="username" class="block text-gray-700 mb-2">用户名</label>
                    <input type="text" id="username" name="username" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-primary" required>
                </div>
                <div class="mb-6">
                    <label for="password" class="block text-gray-700 mb-2">密码</label>
                    <input type="password" id="password" name="password" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-primary" required>
                </div>
                <div class="mb-6 flex items-center">
                    <input type="checkbox" id="remember" name="remember" class="mr-2">
                    <label for="remember" class="text-gray-700">记住我</label>
                </div>
                <button type="submit" class="w-full bg-primary text-white py-2 rounded-lg hover:bg-blue-600 font-bold">登录</button>
                <p class="text-center mt-4">还没有账户？ <a href="register.html" class="text-primary hover:underline">注册</a></p>
            </form>
        </div>
    </div>
    
    <footer class="bg-gray-800 text-white py-8 mt-12">
        <div class="container mx-auto px-4">
            <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
                <div>
                    <h3 class="text-xl font-bold mb-4">AI托管云平台</h3>
                    <p class="text-gray-400">为缺乏专业AI知识的创业者提供便捷的大模型定制服务</p>
                </div>
                <div>
                    <h3 class="text-lg font-bold mb-4">服务</h3>
                    <ul class="space-y-2 text-gray-400">
                        <li><a href="apply_computing.html" class="hover:text-white">云算力租赁</a></li>
                        <li><a href="apply_lora.html" class="hover:text-white">LoRA微调</a></li>
                        <li><a href="apply_prompt.html" class="hover:text-white">Prompt定制</a></li>
                    </ul>
                </div>
                <div>
                    <h3 class="text-lg font-bold mb-4">联系我们</h3>
                    <ul class="space-y-2 text-gray-400">
                        <li><i class="fa fa-envelope mr-2"></i> contact@aicloud.com</li>
                        <li><i class="fa fa-phone mr-2"></i> 400-123-4567</li>
                    </ul>
                </div>
            </div>
            <div class="border-t border-gray-700 mt-8 pt-8 text-center text-gray-400">
                <p>&copy; 2026 AI托管云平台. 保留所有权利.</p>
            </div>
        </div>
    </footer>
    
    <script>
        // 检查用户登录状态
        function checkLoginStatus() {
            const user = localStorage.getItem('currentUser');
            const userStatus = document.getElementById('userStatus');
            if (user) {
                userStatus.innerHTML = `
                    <a href="dashboard.html" class="text-gray-700 hover:text-primary">用户中心</a>
                    <button onclick="logout()" class="text-gray-700 hover:text-primary">退出登录</button>
                `;
            } else {
                userStatus.innerHTML = `
                    <a href="login.html" class="text-gray-700 hover:text-primary">登录</a>
                    <a href="register.html" class="bg-primary text-white px-4 py-2 rounded hover:bg-blue-600">注册</a>
                `;
            }
        }
        
        function logout() {
            localStorage.removeItem('currentUser');
            window.location.href = 'index.html';
        }
        
        // 登录表单处理
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const remember = document.getElementById('remember').checked;
            
            // 获取现有用户数据
            let users = JSON.parse(localStorage.getItem('users')) || [];
            
            // 查找用户
            const user = users.find(user => user.username === username && user.password === password);
            
            if (user) {
                // 登录成功
                localStorage.setItem('currentUser', JSON.stringify(user));
                
                // 跳转到用户中心
                window.location.href = 'dashboard.html';
            } else {
                // 登录失败
                alert('用户名或密码错误');
            }
        });
        
        // 页面加载时检查登录状态
        window.onload = checkLoginStatus;
    </script>
</body>
</html>
