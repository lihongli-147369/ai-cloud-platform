{% extends 'base.html' %}

{% block content %}
    <div class="max-w-2xl mx-auto bg-white rounded-lg shadow-md p-8">
        <h2 class="text-2xl font-bold mb-6">LoRA微调申请</h2>
        <form method="POST">
            <div class="mb-4">
                <label for="base_model" class="block text-gray-700 mb-2">基础模型</label>
                <select id="base_model" name="base_model" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-primary" required>
                    <option value="">请选择</option>
                    <option value="GLM-4">GLM-4</option>
                    <option value="GLM-3">GLM-3</option>
                    <option value="Llama 3">Llama 3</option>
                    <option value="Mistral">Mistral</option>
                </select>
            </div>
            <div class="mb-4">
                <label for="data_description" class="block text-gray-700 mb-2">训练数据描述</label>
                <textarea id="data_description" name="data_description" rows="4" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-primary" required></textarea>
            </div>
            <div class="mb-6">
                <label for="parameters" class="block text-gray-700 mb-2">微调参数</label>
                <textarea id="parameters" name="parameters" rows="3" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-primary" required></textarea>
            </div>
            <button type="submit" class="w-full bg-primary text-white py-2 rounded-lg hover:bg-blue-600 font-bold">提交申请</button>
        </form>
    </div>
{% endblock %}
