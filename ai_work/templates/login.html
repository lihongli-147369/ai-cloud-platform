{% extends 'base.html' %}

{% block content %}
    <div class="max-w-md mx-auto bg-white rounded-lg shadow-md p-8">
        <h2 class="text-2xl font-bold text-center mb-6">用户登录</h2>
        <form method="POST">
            <div class="mb-4">
                <label for="username" class="block text-gray-700 mb-2">用户名</label>
                <input type="text" id="username" name="username" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-primary" required>
            </div>
            <div class="mb-6">
                <label for="password" class="block text-gray-700 mb-2">密码</label>
                <input type="password" id="password" name="password" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-primary" required>
            </div>
            <div class="mb-6 flex items-center">
                <input type="checkbox" id="remember" name="remember" class="mr-2">
                <label for="remember" class="text-gray-700">记住我</label>
            </div>
            <button type="submit" class="w-full bg-primary text-white py-2 rounded-lg hover:bg-blue-600 font-bold">登录</button>
            <p class="text-center mt-4">还没有账户？ <a href="{{ url_for('register') }}" class="text-primary hover:underline">注册</a></p>
        </form>
    </div>
{% endblock %}
