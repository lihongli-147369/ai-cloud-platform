{% extends 'base.html' %}

{% block content %}
    <div class="max-w-md mx-auto bg-white rounded-lg shadow-md p-8">
        <h2 class="text-2xl font-bold text-center mb-6">用户注册</h2>
        <form method="POST">
            <div class="mb-4">
                <label for="username" class="block text-gray-700 mb-2">用户名</label>
                <input type="text" id="username" name="username" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-primary" required>
            </div>
            <div class="mb-4">
                <label for="email" class="block text-gray-700 mb-2">邮箱</label>
                <input type="email" id="email" name="email" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-primary" required>
            </div>
            <div class="mb-6">
                <label for="password" class="block text-gray-700 mb-2">密码</label>
                <input type="password" id="password" name="password" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-primary" required>
            </div>
            <button type="submit" class="w-full bg-primary text-white py-2 rounded-lg hover:bg-blue-600 font-bold">注册</button>
            <p class="text-center mt-4">已有账户？ <a href="{{ url_for('login') }}" class="text-primary hover:underline">登录</a></p>
        </form>
    </div>
{% endblock %}
