<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>用户中心 - AI托管云平台</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#3b82f6',
                        secondary: '#64748b',
                        accent: '#10b981',
                        danger: '#ef4444',
                    },
                },
            }
        }
    </script>
</head>
<body class="bg-gray-50">
    <nav class="bg-white shadow-md">
        <div class="container mx-auto px-4 py-3 flex justify-between items-center">
            <a href="index.html" class="text-2xl font-bold text-primary">
                <i class="fa fa-cloud"></i> AI托管云平台
            </a>
            <div class="flex items-center space-x-4">
                <a href="services.html" class="text-gray-700 hover:text-primary">服务介绍</a>
                <span id="userStatus"></span>
            </div>
        </div>
    </nav>
    
    <div class="container mx-auto px-4 py-8">
        <div class="max-w-4xl mx-auto">
            <h2 class="text-2xl font-bold mb-6">用户中心</h2>
            <div class="bg-white rounded-lg shadow-md p-6 mb-8">
                <h3 class="text-xl font-bold mb-4">我的申请</h3>
                <div id="applicationsList"></div>
            </div>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                <a href="apply_computing.html" class="bg-white rounded-lg shadow-md p-6 hover:shadow-lg transition-shadow">
                    <div class="flex items-center mb-4">
                        <div class="bg-blue-100 rounded-full w-12 h-12 flex items-center justify-center mr-4">
                            <i class="fa fa-server text-2xl text-primary"></i>
                        </div>
                        <h3 class="text-xl font-bold">申请云算力</h3>
                    </div>
                    <p class="text-gray-600">选择GPU型号、内存配置和使用时长</p>
                </a>
                <a href="apply_lora.html" class="bg-white rounded-lg shadow-md p-6 hover:shadow-lg transition-shadow">
                    <div class="flex items-center mb-4">
                        <div class="bg-green-100 rounded-full w-12 h-12 flex items-center justify-center mr-4">
                            <i class="fa fa-cogs text-2xl text-accent"></i>
                        </div>
                        <h3 class="text-xl font-bold">申请LoRA微调</h3>
                    </div>
                    <p class="text-gray-600">选择基础模型并上传训练数据</p>
                </a>
                <a href="apply_prompt.html" class="bg-white rounded-lg shadow-md p-6 hover:shadow-lg transition-shadow">
                    <div class="flex items-center mb-4">
                        <div class="bg-purple-100 rounded-full w-12 h-12 flex items-center justify-center mr-4">
                            <i class="fa fa-magic text-2xl text-purple-600"></i>
                        </div>
                        <h3 class="text-xl font-bold">申请Prompt定制</h3>
                    </div>
                    <p class="text-gray-600">选择模板并描述具体需求</p>
                </a>
            </div>
        </div>
    </div>
    
    <footer class="bg-gray-800 text-white py-8 mt-12">
        <div class="container mx-auto px-4">
            <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
                <div>
                    <h3 class="text-xl font-bold mb-4">AI托管云平台</h3>
                    <p class="text-gray-400">为缺乏专业AI知识的创业者提供便捷的大模型定制服务</p>
                </div>
                <div>
                    <h3 class="text-lg font-bold mb-4">服务</h3>
                    <ul class="space-y-2 text-gray-400">
                        <li><a href="apply_computing.html" class="hover:text-white">云算力租赁</a></li>
                        <li><a href="apply_lora.html" class="hover:text-white">LoRA微调</a></li>
                        <li><a href="apply_prompt.html" class="hover:text-white">Prompt定制</a></li>
                    </ul>
                </div>
                <div>
                    <h3 class="text-lg font-bold mb-4">联系我们</h3>
                    <ul class="space-y-2 text-gray-400">
                        <li><i class="fa fa-envelope mr-2"></i> contact@aicloud.com</li>
                        <li><i class="fa fa-phone mr-2"></i> 400-123-4567</li>
                    </ul>
                </div>
            </div>
            <div class="border-t border-gray-700 mt-8 pt-8 text-center text-gray-400">
                <p>&copy; 2026 AI托管云平台. 保留所有权利.</p>
            </div>
        </div>
    </footer>
    
    <script>
        // 检查用户登录状态
        function checkLoginStatus() {
            const user = localStorage.getItem('currentUser');
            const userStatus = document.getElementById('userStatus');
            if (user) {
                userStatus.innerHTML = `
                    <a href="dashboard.html" class="text-gray-700 hover:text-primary">用户中心</a>
                    <button onclick="logout()" class="text-gray-700 hover:text-primary">退出登录</button>
                `;
            } else {
                userStatus.innerHTML = `
                    <a href="login.html" class="text-gray-700 hover:text-primary">登录</a>
                    <a href="register.html" class="bg-primary text-white px-4 py-2 rounded hover:bg-blue-600">注册</a>
                `;
            }
        }
        
        function logout() {
            localStorage.removeItem('currentUser');
            window.location.href = 'index.html';
        }
        
        // 加载用户申请
        function loadApplications() {
            const user = JSON.parse(localStorage.getItem('currentUser'));
            if (!user) {
                window.location.href = 'login.html';
                return;
            }
            
            const applications = JSON.parse(localStorage.getItem('applications')) || [];
            const userApplications = applications.filter(app => app.user_id === user.id);
            
            const applicationsList = document.getElementById('applicationsList');
            
            if (userApplications.length === 0) {
                applicationsList.innerHTML = '<p class="text-gray-600">暂无申请记录</p>';
                return;
            }
            
            let html = `
                <div class="overflow-x-auto">
                    <table class="w-full">
                        <thead>
                            <tr class="bg-gray-100">
                                <th class="px-4 py-2 text-left">申请类型</th>
                                <th class="px-4 py-2 text-left">状态</th>
                                <th class="px-4 py-2 text-left">提交时间</th>
                                <th class="px-4 py-2 text-left">详情</th>
                            </tr>
                        </thead>
                        <tbody>
            `;
            
            userApplications.forEach(app => {
                let typeText = '';
                switch (app.type) {
                    case 'computing': typeText = '云算力租赁'; break;
                    case 'lora': typeText = 'LoRA微调'; break;
                    case 'prompt': typeText = 'Prompt定制'; break;
                }
                
                let statusClass = '';
                switch (app.status) {
                    case 'pending': statusClass = 'bg-yellow-100 text-yellow-800'; break;
                    case 'approved': statusClass = 'bg-green-100 text-green-800'; break;
                    case 'rejected': statusClass = 'bg-red-100 text-red-800'; break;
                }
                
                html += `
                    <tr class="border-b">
                        <td class="px-4 py-3">${typeText}</td>
                        <td class="px-4 py-3">
                            <span class="px-2 py-1 rounded-full text-xs font-medium ${statusClass}">
                                ${app.status}
                            </span>
                        </td>
                        <td class="px-4 py-3">${new Date(app.created_at).toLocaleString()}</td>
                        <td class="px-4 py-3">${app.details}</td>
                    </tr>
                `;
            });
            
            html += `
                        </tbody>
                    </table>
                </div>
            `;
            
            applicationsList.innerHTML = html;
        }
        
        // 页面加载时检查登录状态并加载申请
        window.onload = function() {
            checkLoginStatus();
            loadApplications();
        };
    </script>
</body>
</html>
